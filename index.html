<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kvíz – Ochrana spotrebiteľa</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.container { width: 100%; max-width: 800px; }
h1 { text-align: center; font-size: 1.6rem; color: #a78bfa; margin-bottom: 30px; }
.stats-bar { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.9rem; color: #a0a0b0; }
.stats-bar span { background: #16213e; padding: 5px 14px; border-radius: 20px; }
.correct { color: #4ade80; }
.incorrect { color: #f87171; }
.progress-bar-wrap { background: #16213e; border-radius: 10px; height: 8px; margin-bottom: 28px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #a78bfa); border-radius: 10px; transition: width 0.4s ease; }
.card { background: #16213e; border-radius: 18px; padding: 40px 36px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); text-align: center; transition: all 0.3s ease; }
.card.flash-correct { box-shadow: 0 0 0 3px #4ade80, 0 8px 32px rgba(0,0,0,0.4); background: #0f2d1f; }
.card.flash-incorrect { box-shadow: 0 0 0 3px #f87171, 0 8px 32px rgba(0,0,0,0.4); background: #2d0f0f; }
.question-number { font-size: 0.85rem; color: #6b6b8a; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 1px; }
.statement { font-size: 1.15rem; line-height: 1.7; color: #e0e0e0; margin-bottom: 36px; min-height: 80px; }
.buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.btn { padding: 14px 40px; border: none; border-radius: 12px; font-size: 1rem; font-family: 'Inter', sans-serif; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
.btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
.btn-true { background: #166534; color: #4ade80; }
.btn-false { background: #7f1d1d; color: #f87171; }
.btn-restart { background: #1e3a5f; color: #93c5fd; }
.btn-retry { background: #3b1f5e; color: #c4b5fd; }
.feedback { margin-top: 24px; padding: 12px 20px; border-radius: 10px; font-size: 0.95rem; font-weight: 600; display: none; }
.feedback.correct { background: #14532d; color: #4ade80; }
.feedback.incorrect { background: #450a0a; color: #f87171; }
.results { display: none; text-align: center; }
.results h2 { font-size: 1.8rem; color: #a78bfa; margin-bottom: 10px; }
.percentage { font-size: 4rem; font-weight: 700; color: #fff; margin: 16px 0 8px; }
.result-message { font-size: 1.1rem; color: #a0a0b0; margin-bottom: 30px; line-height: 1.6; }
.result-detail { display: flex; justify-content: center; gap: 30px; margin-bottom: 30px; flex-wrap: wrap; }
.result-detail div { background: #16213e; border-radius: 12px; padding: 16px 28px; font-size: 1rem; }
.result-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
.start-screen { text-align: center; }
.start-screen p { color: #a0a0b0; margin-bottom: 30px; font-size: 1rem; line-height: 1.6; }
.btn-start { background: linear-gradient(135deg, #7c3aed, #a78bfa); color: #fff; font-size: 1.1rem; padding: 16px 50px; }
@media (max-width: 500px) { .card { padding: 28px 20px; } .statement { font-size: 1rem; } .btn { padding: 12px 28px; } .percentage { font-size: 3rem; } }
</style>
</head>
<body>
<div class="container">
<h1>&#9878; Kvíz – Ochrana spotrebiteľa v SR</h1>

<div class="card start-screen" id="startScreen">
<p>Otestuj svoje vedomosti z ochrany spotrebiteľa.<br>Zobrazí sa ti séria výrokov – označ každý ako <strong>Pravda</strong> alebo <strong>Nepravda</strong>.</p>
<button class="btn btn-start" onclick="startQuiz(allQuestions)">🚀 Spustiť kvíz</button>
</div>

<div id="quizSection" style="display:none;">
<div class="stats-bar">
<span>Otázka <strong id="qNum">1</strong> / <strong id="qTotal">0</strong></span>
<span>✅ <span class="correct" id="correctCount">0</span> &nbsp;|&nbsp; ❌ <span class="incorrect" id="incorrectCount">0</span></span>
</div>
<div class="progress-bar-wrap">
<div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
</div>
<div class="card" id="quizCard">
<div class="question-number" id="questionNumber"></div>
<div class="statement" id="statementText"></div>
<div class="buttons" id="answerButtons">
<button class="btn btn-true" onclick="answer(true)">✅ Pravda</button>
<button class="btn btn-false" onclick="answer(false)">❌ Nepravda</button>
</div>
<div class="feedback" id="feedback"></div>
</div>
</div>

<div class="card results" id="resultsSection">
<h2>🎓 Výsledky kvízu</h2>
<div class="percentage" id="percentageText">0%</div>
<div class="result-message" id="resultMessage"></div>
<div class="result-detail">
<div>✅ Správne: <strong id="finalCorrect">0</strong></div>
<div>❌ Nesprávne: <strong id="finalIncorrect">0</strong></div>
<div>📋 Celkom: <strong id="finalTotal">0</strong></div>
</div>
<div class="result-buttons">
<button class="btn btn-restart" onclick="startQuiz(allQuestions)">Opakovať celý kvíz</button>
<button class="btn btn-retry" id="retryWrongBtn" onclick="retryWrong()">Opakovať chybné otázky</button>
</div>
</div>
</div>

<script>

var currentQuestions = [];
var currentIndex = 0;
var correctCount = 0;
var incorrectCount = 0;
var wrongQuestions = [];
var answered = false;

function shuffle(arr) {
    return arr.slice().sort(function() { return Math.random() - 0.5; });
}

function startQuiz(questions) {
    currentQuestions = shuffle(questions);
    currentIndex = 0;
    correctCount = 0;
    incorrectCount = 0;
    wrongQuestions = [];
    answered = false;
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("resultsSection").style.display = "none";
    document.getElementById("quizSection").style.display = "block";
    document.getElementById("qTotal").textContent = currentQuestions.length;
    showQuestion();
}

function showQuestion() {
    answered = false;
    var q = currentQuestions[currentIndex];
    var total = currentQuestions.length;
    document.getElementById("qNum").textContent = currentIndex + 1;
    document.getElementById("questionNumber").textContent = "Výrok " + (currentIndex + 1) + " z " + total;
    document.getElementById("statementText").textContent = q.text;
    document.getElementById("progressFill").style.width = ((currentIndex / total) * 100) + "%";
    document.getElementById("correctCount").textContent = correctCount;
    document.getElementById("incorrectCount").textContent = incorrectCount;
    var feedback = document.getElementById("feedback");
    feedback.style.display = "none";
    feedback.className = "feedback";
    document.getElementById("answerButtons").style.display = "flex";
    document.getElementById("quizCard").className = "card";
}

function answer(userAnswer) {
    if (answered) return;
    answered = true;
    var q = currentQuestions[currentIndex];
    var isCorrect = userAnswer === q.answer;
    var card = document.getElementById("quizCard");
    var feedback = document.getElementById("feedback");
    if (isCorrect) {
        correctCount++;
        card.className = "card flash-correct";
        feedback.className = "feedback correct";
        feedback.textContent = "✅ Správne!";
    } else {
        incorrectCount++;
        card.className = "card flash-incorrect";
        feedback.className = "feedback incorrect";
        feedback.textContent = "❌ Nesprávne! Správna odpoveď je: " + (q.answer ? "PRAVDA" : "NEPRAVDA");
        wrongQuestions.push(q);
    }
    feedback.style.display = "block";
    document.getElementById("answerButtons").style.display = "none";
    document.getElementById("correctCount").textContent = correctCount;
    document.getElementById("incorrectCount").textContent = incorrectCount;
    setTimeout(function() {
        currentIndex++;
        if (currentIndex < currentQuestions.length) {
            showQuestion();
        } else {
            showResults();
        }
    }, 500);
}

function showResults() {
    document.getElementById("quizSection").style.display = "none";
    document.getElementById("resultsSection").style.display = "block";
    var total = currentQuestions.length;
    var pct = Math.round((correctCount / total) * 100);
    document.getElementById("percentageText").textContent = pct + "%";
    document.getElementById("finalCorrect").textContent = correctCount;
    document.getElementById("finalIncorrect").textContent = incorrectCount;
    document.getElementById("finalTotal").textContent = total;
    var message = "";
    if (pct < 50) {
        message = "Zápočet by si dnes nedostal. Ešte poriadne zopakuj!";
    } else if (pct < 65) {
        message = "Na zápočet by to možno stačilo, ale radšej ešte zopakuj!";
    } else if (pct < 75) {
        message = "Už to celkom vieš! Pár opakovaní a bude to!";
    } else if (pct < 95) {
        message = "Výborné výsledky! Si dobre pripravený!";
    } else if (pct < 100) {
        message = "Takmer dokonalé! Majster spotrebiteľského práva!";
    } else {
        message = "100%! Zo spotrebiteľa môžeš čakať aj A-čko!";
    }
    document.getElementById("resultMessage").textContent = message;
    if (wrongQuestions.length > 0) {
        document.getElementById("retryWrongBtn").style.display = "inline-block";
    } else {
        document.getElementById("retryWrongBtn").style.display = "none";
    }
}

function retryWrong() {
    if (wrongQuestions.length > 0) {
        startQuiz(wrongQuestions);
    }
}
</script>
